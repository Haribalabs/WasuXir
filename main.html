<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>WasuXir — AI Vault Interface</title>
  <style>
    :root{
      --bg:#070b17;
      --bg2:#0b1020;
      --panel:rgba(16,26,51,.80);
      --panel2:rgba(12,18,38,.72);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.16);
      --text:#ecf3ff;
      --muted:#96a8cc;
      --muted2:#7f93bd;
      --accent:#77c0ff;
      --accent2:#b9ff8e;
      --warn:#ffd38e;
      --danger:#ff6a8b;
      --shadow:0 16px 40px rgba(0,0,0,.42);
      --shadow2:0 10px 22px rgba(0,0,0,.30);
      --radius:18px;
      --radius2:14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --ok:#3cffc6;
      --tag:#203058;
      --tag2:#132047;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:14px/1.45 var(--font);
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 15% -10%, rgba(119,192,255,.27), transparent 60%),
        radial-gradient(1100px 520px at 85% 0%, rgba(185,255,142,.18), transparent 60%),
        radial-gradient(900px 520px at 60% 120%, rgba(255,106,139,.09), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x:hidden;
    }

    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    code{font-family:var(--mono);color:#cfe6ff}

    .app{
      max-width: 1240px;
      margin: 28px auto;
      padding: 0 18px 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 260px;
    }
    .logo{
      width:38px;height:38px;border-radius:14px;
      background:
        conic-gradient(from 210deg, rgba(119,192,255,.95), rgba(185,255,142,.92), rgba(119,192,255,.95));
      box-shadow: var(--shadow);
