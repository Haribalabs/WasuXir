<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>WasuXir — AI Vault Interface</title>
  <style>
    :root{
      --bg:#070b17;
      --bg2:#0b1020;
      --panel:rgba(16,26,51,.80);
      --panel2:rgba(12,18,38,.72);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.16);
      --text:#ecf3ff;
      --muted:#96a8cc;
      --muted2:#7f93bd;
      --accent:#77c0ff;
      --accent2:#b9ff8e;
      --warn:#ffd38e;
      --danger:#ff6a8b;
      --shadow:0 16px 40px rgba(0,0,0,.42);
      --shadow2:0 10px 22px rgba(0,0,0,.30);
      --radius:18px;
      --radius2:14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --ok:#3cffc6;
      --tag:#203058;
      --tag2:#132047;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:14px/1.45 var(--font);
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 15% -10%, rgba(119,192,255,.27), transparent 60%),
        radial-gradient(1100px 520px at 85% 0%, rgba(185,255,142,.18), transparent 60%),
        radial-gradient(900px 520px at 60% 120%, rgba(255,106,139,.09), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x:hidden;
    }

    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    code{font-family:var(--mono);color:#cfe6ff}

    .app{
      max-width: 1240px;
      margin: 28px auto;
      padding: 0 18px 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 260px;
    }
    .logo{
      width:38px;height:38px;border-radius:14px;
      background:
        conic-gradient(from 210deg, rgba(119,192,255,.95), rgba(185,255,142,.92), rgba(119,192,255,.95));
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.10);
    }
    .brand h1{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }
    .brand .sub{
      margin:0;
      color:var(--muted);
      font-size:12px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      box-shadow: var(--shadow2);
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background: rgba(255,255,255,.25);
    }
    .dot.ok{background: rgba(60,255,198,.85)}
    .dot.bad{background: rgba(255,106,139,.85)}
    .dot.warn{background: rgba(255,211,142,.90)}

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:9px 12px;
      border-radius: 14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:10px;
      user-select:none;
      box-shadow: var(--shadow2);
    }
    .btn:hover{background:rgba(255,255,255,.10)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{border-color:rgba(119,192,255,.52);background:rgba(119,192,255,.13)}
    .btn.ghost{background:transparent}
    .btn.danger{border-color:rgba(255,106,139,.52);background:rgba(255,106,139,.11)}

    .layout{
      display:grid;
      grid-template-columns: 280px 1fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .brand{min-width:unset}
    }

    .panel{
      background: linear-gradient(180deg, rgba(16,26,51,.90), rgba(12,18,38,.78));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel .hd{
      padding: 14px 14px 10px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .panel .hd .title{
      font-weight: 800;
      letter-spacing: .2px;
    }
    .panel .hd .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
    .panel .bd{padding: 14px}

    .nav{
      display:flex;
      flex-direction:column;
      gap: 8px;
      padding: 10px;
    }
    .nav a{
      display:flex;
      gap: 10px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid transparent;
      color: var(--text);
      text-decoration:none;
      background: rgba(0,0,0,.10);
    }
    .nav a:hover{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      text-decoration:none;
    }
    .nav a.active{
      border-color: rgba(119,192,255,.35);
      background: rgba(119,192,255,.11);
    }
    .nav .k{
      width: 30px;height: 30px;border-radius: 12px;
      display:grid;place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.86);
      font-family: var(--mono);
      font-size: 12px;
    }
    .nav .t{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 0;
    }
    .nav .t b{
      font-size: 13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .nav .t span{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    @media (max-width: 980px){
      .grid2,.grid3{grid-template-columns:1fr}
    }

    .card{
      border:1px solid var(--line);
      background: rgba(0,0,0,.14);
      border-radius: var(--radius2);
      padding: 12px;
    }
    .card h3{margin:0 0 6px;font-size:14px}
    .muted{color:var(--muted)}
    .muted2{color:var(--muted2)}
    .small{font-size:12px}

    .kv{
      display:grid;
      grid-template-columns: 160px 1fr;
      gap: 8px;
    }
    .kv div:nth-child(odd){color:var(--muted)}

    .field{display:flex;flex-direction:column;gap:6px}
    label{color:var(--muted);font-size:12px}
    input,select,textarea{
      width: 100%;
      padding: 10px 11px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
      font: 14px/1.2 var(--font);
    }
    textarea{min-height: 96px;resize: vertical;font-family: var(--mono);font-size:12px}
    input:focus,select:focus,textarea:focus{border-color: rgba(119,192,255,.40)}

    .toast-wrap{
      position: fixed;
      right: 16px;
      bottom: 16px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      z-index: 9999;
      max-width: 420px;
    }
    .toast{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(10,15,32,.86);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px 12px;
      display:flex;
      gap: 10px;
      align-items:flex-start;
      backdrop-filter: blur(10px);
    }
    .toast .i{
      width: 32px;height:32px;border-radius: 14px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      font-family: var(--mono);
      font-size: 12px;
      flex:0 0 auto;
    }
    .toast.ok .i{border-color: rgba(60,255,198,.20); background: rgba(60,255,198,.08)}
    .toast.bad .i{border-color: rgba(255,106,139,.22); background: rgba(255,106,139,.08)}
    .toast.warn .i{border-color: rgba(255,211,142,.22); background: rgba(255,211,142,.07)}
    .toast .t{min-width:0}
    .toast .t b{display:block;margin-bottom:2px}
    .toast .t div{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis}

    table{width:100%;border-collapse:collapse}
    th,td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px}
    .tag{
      display:inline-flex;align-items:center;gap:8px;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.88);
      font-size: 12px;
    }
    .tag.accent{border-color: rgba(119,192,255,.30); background: rgba(119,192,255,.10)}
    .tag.good{border-color: rgba(60,255,198,.24); background: rgba(60,255,198,.09)}
    .tag.warn{border-color: rgba(255,211,142,.24); background: rgba(255,211,142,.09)}
    .tag.bad{border-color: rgba(255,106,139,.26); background: rgba(255,106,139,.09)}

    .spark{
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .spark canvas{
      width: 140px;
      height: 40px;
      border-radius: 12px;
      background: rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.10);
    }
    .spark .m{
      display:flex;flex-direction:column;gap:2px
    }
    .spark .m b{font-size:13px}
    .spark .m span{color:var(--muted);font-size:12px}

    .footer{
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
    }
    .footer .links{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .split{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:space-between;
    }

    .mono{font-family: var(--mono)}
    .right{text-align:right}
    .nowrap{white-space:nowrap}
    .hr{
      height:1px;
      background: rgba(255,255,255,.10);
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <div class="toast-wrap" id="toasts"></div>

  <script>
    // WasuXir — single-page UI consuming Jaja API.
    // Zero dependencies, runs as a file or served by /wasuxir on Jaja.

    const S = {
      apiBase: localStorage.getItem("wasuxir.apiBase") || "",
      apiKey: localStorage.getItem("wasuxir.apiKey") || "",
      csrf: "",
      me: null,
      vaults: [],
      selectedVaultId: localStorage.getItem("wasuxir.selectedVaultId") || "",
      lastHealth: null,
      lastError: null,
      route: "dashboard",
      signals: [],
      allocation: null,
      priceCache: new Map(),
      jobs: new Map(),
      backtestPreview: null
    };

    const el = (tag, attrs = {}, kids = []) => {
      const n = document.createElement(tag);
      for (const [k,v] of Object.entries(attrs || {})){
        if (k === "class") n.className = v;
        else if (k === "html") n.innerHTML = v;
        else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2), v);
        else if (v === null || v === undefined) {}
        else n.setAttribute(k, String(v));
      }
      for (const kid of (kids || [])){
        if (kid === null || kid === undefined) continue;
        if (typeof kid === "string") n.appendChild(document.createTextNode(kid));
        else n.appendChild(kid);
      }
      return n;
    };

    const fmtMoney = (x) => {
      const n = Number(x);
      if (!isFinite(n)) return "n/a";
      return n.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    };
    const fmtPct = (x) => {
      const n = Number(x);
      if (!isFinite(n)) return "n/a";
      return (100*n).toFixed(2) + "%";
    };
    const clip = (s, n=80) => String(s || "").length > n ? String(s).slice(0,n) + "…" : String(s || "");
    const iso = (ts) => {
      if (!ts) return "n/a";
      const d = new Date(Number(ts) * 1000);
      if (!isFinite(d.getTime())) return "n/a";
      return d.toISOString().replace(".000Z","Z");
    };

    const toast = (kind, title, detail) => {
      const wrap = document.getElementById("toasts");
      const t = el("div", { class: "toast " + kind }, [
        el("div", { class: "i" }, [ kind === "ok" ? "OK" : kind === "bad" ? "ERR" : "!" ]),
        el("div", { class: "t" }, [
          el("b", {}, [title]),
          el("div", {}, [String(detail || "")])
        ])
      ]);
      wrap.appendChild(t);
      setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateY(4px)"; }, 3400);
      setTimeout(() => { try{ wrap.removeChild(t); }catch(e){} }, 4200);
    };

    const apiUrl = (path) => {
      const base = (S.apiBase || "").replace(/\/+$/,"");
      if (!base) return path;
      return base + path;
    };

    const apiFetch = async (path, opt = {}) => {
      const headers = Object.assign({}, opt.headers || {});
      if (S.apiKey) headers["X-Jaja-ApiKey"] = S.apiKey;
      if (S.csrf) headers["X-Jaja-Csrf"] = S.csrf;
      if (opt.json){
        headers["Content-Type"] = "application/json";
        opt.body = JSON.stringify(opt.json);
        delete opt.json;
      }
      const res = await fetch(apiUrl(path), Object.assign({}, opt, { headers }));
      const ct = (res.headers.get("content-type") || "");
      let body = null;
      if (ct.includes("application/json")){
        body = await res.json().catch(() => null);
      } else {
        body = await res.text().catch(() => "");
      }
      if (!res.ok){
        const err = (body && body.error) ? body.error : ("http_" + res.status);
        throw new Error(err);
      }
      return body;
    };

    const pickRoute = () => {
      const h = (location.hash || "#dashboard").replace(/^#/,"");
      const parts = h.split("/").filter(Boolean);
      S.route = parts[0] || "dashboard";
      if (parts[1] && parts[0] === "vault") S.selectedVaultId = parts[1];
      if (parts[0] === "vault" && parts[2]) {
        S.route = "vault:" + parts[2];
      }
    };

    window.addEventListener("hashchange", () => {
      pickRoute();
      render();
    });

    const setApiBase = (v) => {
      S.apiBase = (v || "").trim();
      localStorage.setItem("wasuxir.apiBase", S.apiBase);
    };
    const setApiKey = (v) => {
      S.apiKey = (v || "").trim();
      localStorage.setItem("wasuxir.apiKey", S.apiKey);
    };
    const setSelectedVault = (id) => {
      S.selectedVaultId = id || "";
      localStorage.setItem("wasuxir.selectedVaultId", S.selectedVaultId);
    };

    const healthCheck = async () => {
      try{
        const h = await apiFetch("/health");
        S.lastHealth = h && h.data ? h.data : h;
        return true;
      }catch(e){
        S.lastHealth = null;
        S.lastError = String(e.message || e);
        return false;
      }
    };

    const loadMe = async () => {
      try{
        const r = await apiFetch("/api/me");
        S.me = r.data || null;
        S.csrf = (S.me && S.me.csrf) ? S.me.csrf : "";
      }catch(e){
        S.me = null;
        S.csrf = "";
      }
    };

    const loadVaults = async () => {
      const r = await apiFetch("/api/vaults");
      S.vaults = r.data || [];
      if (!S.selectedVaultId && S.vaults.length){
        setSelectedVault(S.vaults[0].id);
      }
    };

    const loadSignals = async (vaultId) => {
      const r = await apiFetch(`/api/vault/${encodeURIComponent(vaultId)}/signals`);
      S.signals = r.data || [];
    };

    const requestAllocation = async (vaultId, horizon) => {
      const r = await apiFetch(`/api/vault/${encodeURIComponent(vaultId)}/allocation`, { method: "POST", json: { horizon } });
      S.allocation = r.data || null;
      return S.allocation;
    };

    const loadPriceSeries = async (symbol, days=30, step=3600) => {
      const key = symbol + ":" + days + ":" + step;
      const cached = S.priceCache.get(key);
      if (cached && (Date.now() - cached.at < 60_000)) return cached.data;
      const r = await apiFetch(`/api/price/${encodeURIComponent(symbol)}/series?days=${days}&step_sec=${step}`);
      const data = r.data || [];
      S.priceCache.set(key, { at: Date.now(), data });
      return data;
    };

    const drawSpark = (canvas, pts, color="#77c0ff") => {
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = Math.floor(canvas.clientWidth * dpr);
      const h = Math.floor(canvas.clientHeight * dpr);
      canvas.width = w; canvas.height = h;
      ctx.clearRect(0,0,w,h);
      ctx.globalAlpha = 1;
      ctx.lineWidth = 2 * dpr;
      ctx.strokeStyle = color;
      ctx.fillStyle = "rgba(119,192,255,.12)";
      if (!pts || pts.length < 2) return;
      let min = Infinity, max = -Infinity;
      for (const p of pts){ const y = Number(p.px); if (isFinite(y)){ min = Math.min(min,y); max=Math.max(max,y);} }
      if (!isFinite(min) || !isFinite(max) || min === max){ min -= 1; max += 1; }
      const pad = 5 * dpr;
      const x0 = pad, x1 = w - pad;
      const y0 = pad, y1 = h - pad;
      const mapX = (i) => x0 + (x1-x0) * (i/(pts.length-1));
      const mapY = (v) => y1 - (y1-y0) * ((v-min)/(max-min));

      ctx.beginPath();
      for (let i=0;i<pts.length;i++){
        const x = mapX(i), y = mapY(pts[i].px);
        if (i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.stroke();

      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      for (let i=0;i<pts.length;i++){
        const x = mapX(i), y = mapY(pts[i].px);
        if (i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.lineTo(x1, y1);
      ctx.lineTo(x0, y1);
      ctx.closePath();
      ctx.fill();
    };

    const navItem = (hash, k, title, sub) => {
      const active = location.hash === hash || (hash === "#dashboard" && (!location.hash || location.hash === "#"));
      return el("a", { href: hash, class: active ? "active" : "" }, [
        el("div", { class: "k" }, [k]),
        el("div", { class: "t" }, [
          el("b", {}, [title]),
          el("span", {}, [sub])
        ])
      ]);
    };

    const cardKpi = (title, value, sub, tone="accent") => {
      const cls = tone === "good" ? "tag good" : tone === "warn" ? "tag warn" : tone === "bad" ? "tag bad" : "tag accent";
      return el("div", { class: "card" }, [
        el("h3", {}, [title]),
        el("div", { style: "display:flex;align-items:center;justify-content:space-between;gap:10px" }, [
          el("div", { style: "font-size:22px;font-weight:900" }, [value]),
          el("span", { class: cls }, [tone.toUpperCase()])
        ]),
        el("div", { class: "muted small" }, [sub])
      ]);
    };

    const viewWelcome = () => {
      const h = S.lastHealth;
      const dotCls = h ? "dot ok" : (S.lastError ? "dot bad" : "dot warn");
      const statusText = h ? ("Connected · " + (h.platform || "Jaja")) : (S.lastError ? ("Offline · " + S.lastError) : "Not checked");
      return el("div", { class: "panel" }, [
        el("div", { class: "hd" }, [
          el("div", {}, [
            el("div", { class: "title" }, ["Connection"]),
            el("div", { class: "hint" }, ["Point WasuXir at your Jaja backend and authenticate with an API key."])
          ]),
          el("div", { class: "pill" }, [ el("span", { class: dotCls }, []), el("span", { class: "small muted" }, [statusText]) ])
        ]),
        el("div", { class: "bd" }, [
          el("div", { class: "grid2" }, [
            el("div", { class: "card" }, [
              el("h3", {}, ["API base URL"]),
              el("div", { class: "muted small" }, ["If you opened WasuXir from Jaja’s `/wasuxir`, you can leave this empty."]),
              el("div", { style: "margin-top:10px" }, [
                el("input", { value: S.apiBase, placeholder: "http://127.0.0.1:8787", oninput: (e) => setApiBase(e.target.value) })
              ]),
              el("div", { style: "display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap" }, [
                el("button", { class: "btn primary", onclick: async () => {
                  const ok = await healthCheck();
                  if (ok) toast("ok","Connected","Health endpoint OK.");
                  else toast("bad","Connection failed", S.lastError || "unknown error");
                  render();
                }}, ["Test connection"]),
                el("button", { class: "btn", onclick: async () => { await boot(); }}, ["Load vaults"])
              ])
            ]),

            el("div", { class: "card" }, [
              el("h3", {}, ["API key"]),
              el("div", { class: "muted small" }, ["Create one in Jaja: Home → API keys → New key."]),
              el("div", { style: "margin-top:10px" }, [
                el("input", { value: S.apiKey, placeholder: "Paste X-Jaja-ApiKey value", oninput: (e) => setApiKey(e.target.value) })
              ]),
              el("div", { style: "display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap" }, [
                el("button", { class: "btn primary", onclick: async () => {
                  try{
                    await loadMe();
