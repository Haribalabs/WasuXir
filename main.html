<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>WasuXir — AI Vault Interface</title>
  <style>
    :root{
      --bg:#070b17;
      --bg2:#0b1020;
      --panel:rgba(16,26,51,.80);
      --panel2:rgba(12,18,38,.72);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.16);
      --text:#ecf3ff;
      --muted:#96a8cc;
      --muted2:#7f93bd;
      --accent:#77c0ff;
      --accent2:#b9ff8e;
      --warn:#ffd38e;
      --danger:#ff6a8b;
      --shadow:0 16px 40px rgba(0,0,0,.42);
      --shadow2:0 10px 22px rgba(0,0,0,.30);
      --radius:18px;
      --radius2:14px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans";
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --ok:#3cffc6;
      --tag:#203058;
      --tag2:#132047;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:14px/1.45 var(--font);
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 15% -10%, rgba(119,192,255,.27), transparent 60%),
        radial-gradient(1100px 520px at 85% 0%, rgba(185,255,142,.18), transparent 60%),
        radial-gradient(900px 520px at 60% 120%, rgba(255,106,139,.09), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      overflow-x:hidden;
    }

    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    code{font-family:var(--mono);color:#cfe6ff}

    .app{
      max-width: 1240px;
      margin: 28px auto;
      padding: 0 18px 40px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 260px;
    }
    .logo{
      width:38px;height:38px;border-radius:14px;
      background:
        conic-gradient(from 210deg, rgba(119,192,255,.95), rgba(185,255,142,.92), rgba(119,192,255,.95));
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.10);
    }
    .brand h1{
      margin:0;
      font-size:16px;
      letter-spacing:.2px;
    }
    .brand .sub{
      margin:0;
      color:var(--muted);
      font-size:12px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      box-shadow: var(--shadow2);
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background: rgba(255,255,255,.25);
    }
    .dot.ok{background: rgba(60,255,198,.85)}
    .dot.bad{background: rgba(255,106,139,.85)}
    .dot.warn{background: rgba(255,211,142,.90)}

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      padding:9px 12px;
      border-radius: 14px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:10px;
      user-select:none;
      box-shadow: var(--shadow2);
    }
    .btn:hover{background:rgba(255,255,255,.10)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{border-color:rgba(119,192,255,.52);background:rgba(119,192,255,.13)}
    .btn.ghost{background:transparent}
    .btn.danger{border-color:rgba(255,106,139,.52);background:rgba(255,106,139,.11)}

    .layout{
      display:grid;
      grid-template-columns: 280px 1fr;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .brand{min-width:unset}
    }

    .panel{
      background: linear-gradient(180deg, rgba(16,26,51,.90), rgba(12,18,38,.78));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel .hd{
      padding: 14px 14px 10px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .panel .hd .title{
      font-weight: 800;
      letter-spacing: .2px;
    }
    .panel .hd .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }
    .panel .bd{padding: 14px}

    .nav{
      display:flex;
      flex-direction:column;
      gap: 8px;
      padding: 10px;
    }
    .nav a{
      display:flex;
      gap: 10px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid transparent;
      color: var(--text);
      text-decoration:none;
      background: rgba(0,0,0,.10);
    }
    .nav a:hover{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      text-decoration:none;
    }
    .nav a.active{
      border-color: rgba(119,192,255,.35);
      background: rgba(119,192,255,.11);
    }
    .nav .k{
      width: 30px;height: 30px;border-radius: 12px;
      display:grid;place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.86);
      font-family: var(--mono);
      font-size: 12px;
    }
    .nav .t{
      display:flex;
      flex-direction:column;
      gap: 2px;
      min-width: 0;
    }
    .nav .t b{
      font-size: 13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .nav .t span{
      color: var(--muted);
      font-size: 12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
